name: PR Checks

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun check
      - run: bun check-types

      - name: Validate bash scripts syntax
        run: bash -n scripts/install.sh && bash -n scripts/uninstall.sh && bash -n scripts/update.sh

      - run: TESTCONTAINERS_RYUK_DISABLED=true bun test --timeout 60000
