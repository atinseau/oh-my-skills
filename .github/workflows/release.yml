name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Bump version in package.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          for script in scripts/install.sh scripts/uninstall.sh scripts/update.sh; do
            sed -i "s|^DEFAULT_TAG=.*$|DEFAULT_TAG=\"${GITHUB_REF_NAME}\" # Set by release workflow in tagged installer commits; kept empty on master|" "$script"
          done

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json scripts/install.sh scripts/uninstall.sh scripts/update.sh
          git diff --cached --quiet || git commit -m "chore: bump version to ${GITHUB_REF_NAME#v}"
          git push origin master

      - name: Update tag to include version bump
        run: |
          git tag -f ${{ github.ref_name }}
          git push origin ${{ github.ref_name }} --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/install.sh | bash
            ```

            ## Uninstall

            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/uninstall.sh) --yes
            ```
          generate_release_notes: true

      - name: Restore master installer to canary mode
        run: |
          for script in scripts/install.sh scripts/uninstall.sh scripts/update.sh; do
            sed -i 's|^DEFAULT_TAG=.*$|DEFAULT_TAG="" # Set by release workflow in tagged installer commits; kept empty on master|' "$script"
          done
          git add scripts/install.sh scripts/uninstall.sh scripts/update.sh
          git diff --cached --quiet || git commit -m "chore: restore canary installer mode"
          git push origin master
